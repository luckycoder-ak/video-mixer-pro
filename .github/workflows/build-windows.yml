name: Build Windows Installer

# 触发条件：
#   1. 手动触发（Actions 页面点 "Run workflow"）
#   2. push 形如 v1.0.0 的 tag 时触发并自动建 Release
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

# softprops/action-gh-release 创建 Release 需要写 Contents 权限
permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo registry & build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      # 下载 FFmpeg 官方静态构建并按 Tauri sidecar 命名规范放入 binaries/
      # 这样 ffmpeg.exe 会被打包进最终 .msi/.exe 安装包，用户无需单独安装
      - name: Download & bundle ffmpeg sidecar
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $url = 'https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip'
          $zip = "$env:RUNNER_TEMP\ffmpeg.zip"
          $extract = "$env:RUNNER_TEMP\ffmpeg-extract"
          Write-Host "Downloading ffmpeg static build from $url"
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath $extract -Force
          $ffmpegExe = (Get-ChildItem -Path $extract -Recurse -Filter 'ffmpeg.exe' | Select-Object -First 1).FullName
          if (-not $ffmpegExe) { throw 'ffmpeg.exe not found in archive' }
          New-Item -ItemType Directory -Force -Path 'src-tauri/binaries' | Out-Null
          # Tauri sidecar 命名要求：<name>-<target-triple>.exe
          Copy-Item $ffmpegExe 'src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe'
          Write-Host "Sidecar ffmpeg ready: src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri (Windows .exe + .msi + .nsis)
        run: npm run tauri build -- --target x86_64-pc-windows-msvc

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: video-mixer-pro-windows
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/*.exe
          if-no-files-found: warn
          retention-days: 30

      # tag push 时同步发 Release
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
